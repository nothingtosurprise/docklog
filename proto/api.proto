syntax = "proto3";

package api;

option go_package = "docklog/proto";

message Container {
  string id = 1;
  string name = 2;
  string image = 3;
  string state = 4;
}

message ContainerList {
  repeated Container containers = 1;
}

message LogLine {
  string content = 1;
  int64 timestamp = 2;
}
